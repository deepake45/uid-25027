<!DOCTYPE html>
<html>
    <head>
        <title style="text-align: center;"> Admission Register</title>
    </head>
    <body>
        <h1 style="text-align: center;">College Admission Registration</h1>
        <form>
            <table border="1" style="margin: auto;" height="500px" width="800px"> 
                <tr>
                    <td>Full Name:</td>
                    <td><input type="text" name="fullname"></td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td><input type="email" name="email"></td>
                </tr>
                <tr>
                    <td>Phone Number:</td>
                    <td><input type="number" name="phonenumber"></td>
                </tr>
                <tr>
                    <td>Gender:</td>
                    <td><input type="radio" id="male" name="male" value="gender" ><label for="male">Male</label>
                    <input type="radio" id="female" name="female" value="gender" ><label for="female">Female</label>
                    <input type="radio" id="other" name="other" value="gender" ><label for="other">Other</label>
                    </td>
                </tr>
                <tr>
                    <td>Course Applying For:</td>
                    <td><select id="course" name="course">
                        <option value="btech">B.Tech</option>
                        <option value="bsc">B.Sc</option>
                        <option value="ba">B.A</option>
                        <option value="bcom">B.Com</option></select></td>
                </tr>
                <tr>
                    <td>Hobbies:</td>
                    <td><input type="checkbox" id="sports" name="hobbies" value="sports"><label for="sports">Sports</label>
                    <input type="checkbox" id="music" name="hobbies" value="music"><label for="music">Music</label>
                    <input type="checkbox" id="reading" name="hobbies" value="reading"><label for="reading">Reading</label></td>
                </tr>
                <tr>
                    <td>Date of Birth:</td>
                    <td><input type="date" name="dob"></td>
                </tr>
                <tr>
                    <td>Upload Certificates:</td>
                    <td><input type="file" name="certificates"></td>
                </tr>
                <tr>
                    <td>Address:</td>
                    <td><textarea name="address" rows="4" cols="50"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;"><input type="submit" value="Submit">
                    <input type="reset" value="Reset"></td>
            </table>
        </form>
    </body>
</html>
