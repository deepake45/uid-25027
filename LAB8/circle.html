<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotating Ball Animation</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Start from left */
            background: #111827; /* Dark background for contrast */
            overflow: hidden;
            padding: 0 20px;
        }

        .ball {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f87171, #60a5fa);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            animation: moveRotate 3s linear infinite alternate;
        }

        @keyframes moveRotate {
            from {
                transform: translateX(0) rotate(0deg);
            }
            to {
                transform: translateX(320px) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="ball"></div>
</body>
</html>
