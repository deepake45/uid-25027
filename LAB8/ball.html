<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            padding: 200px;
        }

        .ball {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ef4444;
            animation: bounce 1.2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-120px);
            }
        }
    </style>
</head>
<body>
    <div class="ball"></div>
</body>
</html>
