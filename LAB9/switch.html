<!DOCTYPE html>
<html>
<head>
</head>
<body>
    <script>
        let a = Number(window.prompt("Enter your marks:"));
        switch(true){
            case a>95:
                document.write("O");
                break;
            case a>90:
                document.write("A+");
                break;
            case a>85:
                document.write("A");
                break;
            default:
                document.write("F");
                break;
        }
    </script>
</body>
</html>
