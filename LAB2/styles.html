<!DOCTYPE html>
<html>
    <head>
        <title>styles example</title>
        <style>
            .highlight {
                background-color: yellow;
                font-weight: bold;
            }
            .italic {
                font-style: italic;
            }
        </style>
    </head>
    <body>
        <p class="highlight">This paragraph is highlighted with a yellow background and bold text.</p>
        <p class="italic">This paragraph is styled in italics.</p>
    </body>
</html>
