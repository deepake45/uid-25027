<!DOCTYPE html>
<html>


<head>
    <title>Transition example</title>
<style>
div:hover {
    background-color: red;
    transition-duration: 2s;
    transition-property: all;
    transform-style: preserve-3d;
}
</style>
</head>
<body>
<h1>CSS Transition Example</h1>
<p>Hover over the box to see the transition effect.</p>
<div style="width:100px; height:100px; background-color:blue; transition: background-color 0.5s ease; transition: duration 2s;transition-property:all ;transform-style: preserve-3d;">
    Hover me!
</div>
</body>
</html>
