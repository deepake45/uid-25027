<!DOCTYPE html>
<html>
    <head>
        <title>E-COMMERCE STORE</title>
    <style>
        body{
            font-family: Arial;
            margin:0;
        }

        header{
            background:#c61d2d;
            color:white;
            padding:15px;
            font-size:22px;
        }
        .container{
            display:flex;
        }

        .sidebar{
            width:220px;
            background:#c61d2d;
            color:white;
            padding:20px;
            height:500px;
        }

        .sale-banner{
            background:#ffe5e5;
            color:#c61d2d;
            text-align:center;
            padding:10px;
            font-size:20px;
            font-weight:bold;
        }
        .sidebar label{
            display:block;
            margin:10px 0;
            cursor:pointer;
        }
        input{
            display:none;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
            padding:20px;
            flex:1;
        }


    
    </style>
    </head>
</html>
